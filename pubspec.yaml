name: muhafiz_app
description: Muhafiz - Township Staff Gate Management System
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase core
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.5

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # QR code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # Reports / Export
  excel: ^4.0.6
  path_provider: ^2.1.5
  open_file: ^3.5.10
  share_plus: ^10.1.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.3
  shared_preferences: ^2.3.5
  encrypt: ^5.0.3
  permission_handler: ^11.4.0

  # Local notifications
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
